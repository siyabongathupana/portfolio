<head>
  <meta charset="UTF-8">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <link rel="icon" type="image/png" href="favicon.png">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="config.js"></script>
  <script src="crypto.js"></script>
  <script src="api.js"></script>
  <script src="shared.js"></script>
  <style>
    /* Additional timesheet styles – compact and professional */
    .timesheet-container {
      max-width: 1400px;
      margin: 30px auto;
      background: white;
      border-radius: 24px;
      padding: 25px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.05);
    }
    .quick-log-card {
      background: #f8fafc;
      border-radius: 20px;
      padding: 20px;
      margin-bottom: 25px;
      border: 1px solid #e2e8f0;
    }
    .progress-bar-container {
      background: #e2e8f0;
      border-radius: 30px;
      height: 28px;
      overflow: hidden;
      margin: 10px 0;
    }
    .progress-fill {
      background: #2fc7ff;
      width: 0%;
      height: 100%;
      border-radius: 30px;
      transition: width 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding-right: 12px;
      color: white;
      font-weight: 600;
      font-size: 0.8rem;
    }
    .chart-card {
      background: #ffffff;
      border-radius: 16px;
      padding: 15px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
      height: 100%;
      text-align: center;
    }
    .chart-card canvas {
      max-width: 280px;
      margin: 0 auto;
    }
    .filter-bar {
      background: #f1f5f9;
      padding: 12px 15px;
      border-radius: 16px;
      margin-bottom: 20px;
    }
    .history-table th {
      background: #0b2b3b;
      color: white;
      font-weight: 600;
      font-size: 0.85rem;
    }
    .history-table td {
      font-size: 0.85rem;
      vertical-align: middle;
    }
    .total-row {
      background: #e9f2fa;
      font-weight: bold;
    }
    @media print {
      body {
        background: white;
        padding: 0;
        margin: 0;
      }
      .timesheet-container {
        box-shadow: none;
        padding: 0;
        margin: 0;
        max-width: 100%;
      }
      .quick-log-card, .filter-bar, .btn, nav, footer, .print-hide, .chart-card {
        display: none !important;
      }
      .history-table {
        width: 100%;
        border-collapse: collapse;
      }
      .history-table th, .history-table td {
        border: 1px solid #000;
        padding: 8px;
        font-size: 10pt;
      }
      .history-table th {
        background: #f0f0f0 !important;
        color: black !important;
      }
      .total-row {
        background: #f0f0f0 !important;
      }
      @page {
        size: landscape;
        margin: 1cm;
      }
    }
    @media (max-width: 768px) {
      .timesheet-container { padding: 15px; }
      .chart-card canvas { max-width: 200px; }
    }
  </style>
</head>
<body style="background:#eef3fc;">

<nav class="navbar navbar-expand-lg custom_nav-container pt-3" style="background:#0b2b3b; padding:15px 0;">
  <div class="container">
    <a class="navbar-brand" href="index.html"><span>Your</span> Portfolio</a>
    <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navTimesheet">
      <span class="fa fa-bars text-white"></span>
    </button>

      <ul class="navbar-nav ml-auto">
        <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>

        <li class="nav-item"><a class="nav-link" href="certificates.html">Certificates</a></li>

        <li class="nav-item"><a class="nav-link" href="admin.html">Manage</a></li>

<div class="container timesheet-container" id="timesheetApp">
  <div class="d-flex justify-content-between align-items-center flex-wrap mb-3">
    <h3><i class="fa fa-clock-o"></i> Timesheet</h3>
    <div>
      <button id="exportCsvBtn" class="btn btn-sm btn-success mr-2"><i class="fa fa-file-excel-o"></i> Export CSV</button>
      <button id="printBtn" class="btn btn-sm btn-secondary"><i class="fa fa-print"></i> Print / PDF</button>
    </div>
  </div>

  <!-- Quick Log Form (compact) -->
  <div class="quick-log-card">
    <h6 class="mb-3"><i class="fa fa-pencil-square-o"></i> Log Task</h6>
    <div class="row">
      <div class="col-md-2">
        <label>Date</label>
        <input type="date" id="logDate" class="form-control form-control-sm">
      </div>
      <div class="col-md-2">
        <label>Start</label>
        <div class="input-group input-group-sm">
          <input type="time" id="startTime" class="form-control">
          <div class="input-group-append">
            <button class="btn btn-outline-secondary btn-sm" id="nowStartBtn" type="button">Now</button>
          </div>
        </div>
      </div>
      <div class="col-md-2">
        <label>End</label>
        <div class="input-group input-group-sm">
          <input type="time" id="endTime" class="form-control">
          <div class="input-group-append">
            <button class="btn btn-outline-secondary btn-sm" id="nowEndBtn" type="button">Now</button>
          </div>
        </div>
      </div>
      <div class="col-md-1">
        <label>Hours</label>
        <input type="text" id="hoursAuto" class="form-control form-control-sm" readonly placeholder="0.00">
      </div>
      <div class="col-md-2">
        <label>Category</label>
        <select id="taskCategory" class="form-control form-control-sm">
          <option>Development</option><option>Meetings</option><option>Admin</option>
          <option>CodeReview</option><option>Learning</option><option>Other</option>
        </select>
      </div>
      <div class="col-md-1">
        <label>Billable</label>
        <select id="billable" class="form-control form-control-sm">
          <option value="yes">Yes</option><option value="no">No</option>
        </select>
      </div>
      <div class="col-md-2">
        <label>Notes / Ticket #</label>
        <input type="text" id="taskNotes" class="form-control form-control-sm" placeholder="JIRA-123">
      </div>
    </div>
    <div class="mt-3">
      <button id="addEntryBtn" class="btn btn-delta btn-sm"><i class="fa fa-plus"></i> Add Entry</button>
    </div>
  </div>

  <!-- Daily Progress Bar -->
  <div class="mb-3">
    <h6>Today's Progress (8h target)</h6>
    <div class="progress-bar-container">
      <div id="dailyProgressFill" class="progress-fill">0h</div>
    </div>
  </div>

  <!-- Two small charts side by side -->
  <div class="row mb-4">
    <div class="col-md-6">
      <div class="chart-card">
        <h6>Category Breakdown (filtered)</h6>
        <canvas id="categoryChart" width="280" height="200"></canvas>
      </div>
    </div>
    <div class="col-md-6">
      <div class="chart-card">
        <h6>Billable vs Non-Billable</h6>
        <canvas id="billableChart" width="280" height="200"></canvas>
      </div>
    </div>
  </div>

  <!-- Filter Bar -->
  <div class="filter-bar d-flex flex-wrap align-items-center justify-content-between">
    <div class="d-flex align-items-center">
      <label class="mr-2 mb-0">View:</label>
      <select id="filterRange" class="form-control form-control-sm mr-3" style="width:100px;">
        <option value="day">Today</option>
        <option value="week" selected>This Week</option>
        <option value="month">This Month</option>
      </select>
      <label class="mr-2 mb-0">Category:</label>
      <select id="filterCategory" class="form-control form-control-sm" style="width:140px;">
        <option value="all">All</option>
        <option value="Development">Development</option>
        <option value="Meetings">Meetings</option>
        <option value="Admin">Admin</option>
        <option value="CodeReview">CodeReview</option>
        <option value="Learning">Learning</option>
        <option value="Other">Other</option>
      </select>
    </div>
    <button id="refreshHistoryBtn" class="btn btn-sm btn-outline-info"><i class="fa fa-refresh"></i> Refresh</button>
  </div>

  <!-- History Table -->
  <div class="table-responsive">
    <table class="table table-bordered history-table">
      <thead>
        <tr>
          <th>Date</th><th>Start</th><th>End</th><th>Hours</th><th>Category</th><th>Billable</th><th>Notes</th>
          <th class="print-hide">Action</th>
        </tr>
      </thead>
      <tbody id="historyBody">
        <tr><td colspan="8" class="text-center">Loading...</td><th>?
      </tbody>
      <tfoot id="historyFoot" style="display:none;">
        <tr><td colspan="3" class="text-right"><strong>Total:</strong></td>
        <td id="totalHoursCell"><strong>0.00</strong></td><td colspan="4"></td>
      </tr>
      </tfoot>
    </table>
  </div>
</div>

<footer>
  <p>© 2025 Your Portfolio</p>
  <p class="footer-status"><span id="userFooterStatus"></span></p>
</footer>

<script src="timesheet.js"></script>
<script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
