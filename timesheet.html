<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Timesheet | Your Portfolio</title>
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <link rel="icon" type="image/png" href="favicon.png">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="config.js"></script>
  <script src="crypto.js"></script>
  <script src="api.js"></script>
  <script src="shared.js"></script>
  <style>
    /* Additional timesheet styles */
    .timesheet-container {
      max-width: 1400px;
      margin: 40px auto;
      background: white;
      border-radius: 32px;
      padding: 30px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    }
    .quick-log-card {
      background: #f8fafc;
      border-radius: 24px;
      padding: 20px;
      margin-bottom: 30px;
      border: 1px solid #e2e8f0;
    }
    .progress-bar-container {
      background: #e2e8f0;
      border-radius: 20px;
      height: 30px;
      overflow: hidden;
      margin: 15px 0;
    }
    .progress-fill {
      background: #2fc7ff;
      width: 0%;
      height: 100%;
      border-radius: 20px;
      transition: width 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding-right: 10px;
      color: white;
      font-weight: bold;
      font-size: 0.8rem;
    }
    .category-badge {
      background: #e9f2fa;
      padding: 5px 12px;
      border-radius: 20px;
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.2s;
      margin: 3px;
      display: inline-block;
    }
    .category-badge.active {
      background: #2fc7ff;
      color: white;
    }
    .history-table th, .history-table td {
      vertical-align: middle;
    }
    .print-hide {
      @media print {
        display: none !important;
      }
    }
    @media print {
      body {
        background: white;
        padding: 0;
        margin: 0;
      }
      .timesheet-container {
        box-shadow: none;
        padding: 0;
        margin: 0;
      }
      .quick-log-card, .filter-bar, .btn, nav, footer, .print-hide {
        display: none !important;
      }
      .history-table {
        width: 100%;
        border-collapse: collapse;
      }
      .history-table th, .history-table td {
        border: 1px solid #ddd;
        padding: 8px;
      }
    }
  </style>
</head>
<body style="background:#eef3fc;">

<nav class="navbar navbar-expand-lg custom_nav-container pt-3" style="background:#0b2b3b; padding:15px 0;">
  <div class="container">
    <a class="navbar-brand" href="index.html"><span>Your</span> Portfolio</a>
    <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navTimesheet">
      <span class="fa fa-bars text-white"></span>
    </button>

      <ul class="navbar-nav ml-auto">
        <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>

        <li class="nav-item"><a class="nav-link" href="certificates.html">Certificates</a></li>

        <li class="nav-item"><a class="nav-link" href="admin.html">Manage</a></li>
      </ul>
    </div>
  </div>
</nav>

<div class="container timesheet-container" id="timesheetApp">
  <div class="d-flex justify-content-between align-items-center flex-wrap mb-4">
    <h2><i class="fa fa-clock-o"></i> Timesheet</h2>
    <div>
      <button id="exportCsvBtn" class="btn btn-success btn-sm mr-2"><i class="fa fa-file-excel-o"></i> Export CSV</button>
      <button id="printBtn" class="btn btn-secondary btn-sm"><i class="fa fa-print"></i> Print / PDF</button>
    </div>
  </div>

  <!-- Quick Log Form -->
  <div class="quick-log-card">
    <h5><i class="fa fa-pencil-square-o"></i> Log Task</h5>
    <div class="row">
      <div class="col-md-3">
        <label>Date</label>
        <input type="date" id="logDate" class="form-control" value="">
      </div>
      <div class="col-md-3">
        <label>Start Time</label>
        <div class="input-group">
          <input type="time" id="startTime" class="form-control">
          <div class="input-group-append">
            <button class="btn btn-outline-secondary" id="nowStartBtn" type="button">Now</button>
          </div>
        </div>
      </div>
      <div class="col-md-3">
        <label>End Time</label>
        <div class="input-group">
          <input type="time" id="endTime" class="form-control">
          <div class="input-group-append">
            <button class="btn btn-outline-secondary" id="nowEndBtn" type="button">Now</button>
          </div>
        </div>
      </div>
      <div class="col-md-3">
        <label>Hours (auto)</label>
        <input type="text" id="hoursAuto" class="form-control" readonly placeholder="0.00">
      </div>
    </div>
    <div class="row mt-2">
      <div class="col-md-4">
        <label>Category</label>
        <select id="taskCategory" class="form-control">
          <option value="Development">#Development</option>
          <option value="Meetings">#Meetings</option>
          <option value="Admin">#Admin</option>
          <option value="CodeReview">#CodeReview</option>
          <option value="Learning">#Learning</option>
          <option value="Other">#Other</option>
        </select>
      </div>
      <div class="col-md-4">
        <label>Billable</label>
        <select id="billable" class="form-control">
          <option value="yes">Yes (Billable)</option>
          <option value="no">No (Non-billable)</option>
        </select>
      </div>
      <div class="col-md-4">
        <label>Quick Notes / Ticket #</label>
        <input type="text" id="taskNotes" class="form-control" placeholder="JIRA-123, description...">
      </div>
    </div>
    <div class="mt-3">
      <button id="addEntryBtn" class="btn btn-delta"><i class="fa fa-plus"></i> Add Entry</button>
    </div>
  </div>

  <!-- Daily Progress Bar -->
  <div class="mb-4">
    <h5>Today's Progress (Target: 8h)</h5>
    <div class="progress-bar-container">
      <div id="dailyProgressFill" class="progress-fill">0h</div>
    </div>
  </div>

  <!-- Analytics Row -->
  <div class="row mb-4">
    <div class="col-md-6">
      <div class="card">
        <div class="card-body">
          <h5>Category Breakdown (This Week)</h5>
          <canvas id="categoryChart" width="400" height="250"></canvas>
        </div>
      </div>
    </div>
    <div class="col-md-6">
      <div class="card">
        <div class="card-body">
          <h5>Billable vs Non-Billable (This Week)</h5>
          <canvas id="billableChart" width="400" height="250"></canvas>
        </div>
      </div>
    </div>
  </div>

  <!-- Filter Bar -->
  <div class="filter-bar mb-3 d-flex flex-wrap align-items-center">
    <div class="mr-3 mb-2">
      <label>View:</label>
      <select id="filterRange" class="form-control form-control-sm" style="width:120px; display:inline-block; margin-left:5px;">
        <option value="day">Today</option>
        <option value="week" selected>This Week</option>
        <option value="month">This Month</option>
      </select>
    </div>
    <div class="mr-3 mb-2">
      <label>Category:</label>
      <select id="filterCategory" class="form-control form-control-sm" style="width:150px; display:inline-block; margin-left:5px;">
        <option value="all">All</option>
        <option value="Development">Development</option>
        <option value="Meetings">Meetings</option>
        <option value="Admin">Admin</option>
        <option value="CodeReview">CodeReview</option>
        <option value="Learning">Learning</option>
        <option value="Other">Other</option>
      </select>
    </div>
    <div class="mb-2">
      <button id="refreshHistoryBtn" class="btn btn-sm btn-outline-info"><i class="fa fa-refresh"></i> Refresh</button>
    </div>
  </div>

  <!-- History Table -->
  <div class="table-responsive">
    <table class="table table-bordered history-table" id="historyTable">
      <thead class="thead-light">
        <tr>
          <th>Date</th>
          <th>Start</th>
          <th>End</th>
          <th>Hours</th>
          <th>Category</th>
          <th>Billable</th>
          <th>Notes</th>
          <th class="print-hide">Actions</th>
        </tr>
      </thead>
      <tbody id="historyBody">
        <tr><td colspan="8" class="text-center">Loading...</td></tr>
      </tbody>
    </table>
  </div>
</div>

<footer>
  <p>© 2025 Your Portfolio</p>
  <p class="footer-status"><span id="userFooterStatus"></span></p>
</footer>

<script src="timesheet.js"></script>

</body>
</html>
