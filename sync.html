<!-- sync.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sync to GitHub | DeltaV Portfolio</title>
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <script src="config.js"></script>
  <script src="shared.js"></script>
  <style>
    .sync-container { max-width: 700px; margin: 60px auto; background: white; border-radius: 32px; padding: 40px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); }
    .sync-status-box { min-height: 50px; word-break: break-word; }
  </style>
</head>
<body style="background:#eef3fc;">

<div class="sync-container">
  <div class="text-center mb-4">
    <h2><i class="fa fa-github"></i> Sync Portfolio to GitHub</h2>
    <p class="text-muted">Push your latest projects and certificates from this browser to your GitHub repository.</p>
  </div>

  <div class="github-settings">
    <h5>Repository Settings</h5>
    <div class="form-row">
      <div class="col-md-4"><label>Owner</label><input type="text" id="ghOwner" class="form-control" placeholder="username"></div>
      <div class="col-md-4"><label>Repo</label><input type="text" id="ghRepo" class="form-control" placeholder="deltaV-portfolio"></div>
      <div class="col-md-4"><label>Branch</label><input type="text" id="ghBranch" class="form-control" value="main"></div>
    </div>
    <div class="form-row mt-2">
      <div class="col-md-8"><label>Personal Access Token</label><input type="password" id="ghToken" class="form-control" placeholder="ghp_..."></div>
      <div class="col-md-4 d-flex align-items-end">
        <button class="btn btn-outline-primary btn-block" id="testGhConnectionBtn"><i class="fa fa-plug"></i> Test Connection</button>
      </div>
    </div>
    <div class="mt-2">
      <small class="text-muted">Your token is stored only in this browser’s local storage. It is never shared.</small>
    </div>
  </div>

  <hr>

  <div class="text-center">
    <button class="btn btn-delta btn-lg mr-2" id="syncAllBtn"><i class="fa fa-cloud-upload"></i> Sync All Data Now</button>
    <button class="btn btn-outline-danger btn-lg" id="forcePushBtn"><i class="fa fa-exclamation-triangle"></i> Force Push (overwrite)</button>
  </div>

  <div id="syncStatus" class="mt-4 sync-status-box alert" style="display:none;"></div>
</div>

<script>
  const GH_CONFIG_KEY = 'deltaV_github_config';

  function showStatus(msg, type = 'info') {
    const box = document.getElementById('syncStatus');
    box.textContent = msg;
    box.className = `mt-4 sync-status-box alert alert-${type}`;
    box.style.display = 'block';
    setTimeout(() => { box.style.display = 'none'; }, 6000);
  }

  const saved = JSON.parse(localStorage.getItem(GH_CONFIG_KEY) || 'null');
  if (saved) {
    document.getElementById('ghOwner').value = saved.owner || '';
    document.getElementById('ghRepo').value = saved.repo || '';
    document.getElementById('ghBranch').value = saved.branch || 'main';
    document.getElementById('ghToken').value = saved.token || '';
  }

  function getConfig() {
    return {
      owner: document.getElementById('ghOwner').value.trim(),
      repo: document.getElementById('ghRepo').value.trim(),
      branch: document.getElementById('ghBranch').value.trim() || 'main',
      token: document.getElementById('ghToken').value.trim()
    };
  }

  function saveConfigToStorage(config) {
    localStorage.setItem(GH_CONFIG_KEY, JSON.stringify(config));
  }

  document.getElementById('testGhConnectionBtn').addEventListener('click', async () => {
    const config = getConfig();
    if (!config.token || !config.owner || !config.repo) {
      showStatus('Please fill in Owner, Repo, and Token.', 'warning');
      return;
    }
    try {
      const resp = await fetch(`https://api.github.com/repos/${config.owner}/${config.repo}`, {
        headers: { Authorization: `token ${config.token}` }
      });
      if (resp.ok) {
        showStatus('✅ Connection successful! Repo exists and token is valid.', 'success');
        saveConfigToStorage(config);
      } else {
        const data = await resp.json();
        showStatus(`❌ Connection failed: ${data.message}`, 'danger');
      }
    } catch (e) {
      showStatus('❌ Network error – check your internet connection.', 'danger');
    }
  });

  async function syncFile(config, path, content) {
    const url = `https://api.github.com/repos/${config.owner}/${config.repo}/contents/${path}`;
    let sha = null;
    try {
      const getResp = await fetch(url, {
        headers: { Authorization: `token ${config.token}` }
      });
      if (getResp.ok) {
        const data = await getResp.json();
        sha = data.sha;
      } else if (getResp.status !== 404) {
        throw new Error(`GitHub GET ${path} failed: ${getResp.status}`);
      }
    } catch (e) {
      throw e;
    }

    const body = {
      message: `Update ${path} via sync page`,
      content: btoa(unescape(encodeURIComponent(content))),
      branch: config.branch
    };
    if (sha) body.sha = sha;

    const putResp = await fetch(url, {
      method: 'PUT',
      headers: {
        Authorization: `token ${config.token}`,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify(body)
    });
    if (!putResp.ok) {
      const err = await putResp.json();
      throw new Error(err.message || 'GitHub PUT failed');
    }
  }

  async function syncAll(config) {
    const projects = await window.portfolioData.loadProjects();
    const certs = await window.portfolioData.loadCertificates();

    try {
      await syncFile(config, 'data/projects.json', JSON.stringify(projects, null, 2));
      await syncFile(config, 'data/certificates.json', JSON.stringify(certs, null, 2));
      showStatus('✅ Successfully synced projects.json and certificates.json to GitHub.', 'success');
      saveConfigToStorage(config);
    } catch (e) {
      showStatus(`❌ Sync failed: ${e.message}`, 'danger');
    }
  }

  document.getElementById('syncAllBtn').addEventListener('click', async () => {
    const config = getConfig();
    if (!config.token || !config.owner || !config.repo) {
      showStatus('Please fill in all repository settings first.', 'warning');
      return;
    }
    showStatus('Syncing…', 'info');
    await syncAll(config);
  });

  document.getElementById('forcePushBtn').addEventListener('click', async () => {
    if (!confirm('Force push will overwrite the remote files. Continue?')) return;
    const config = getConfig();
    if (!config.token) {
      showStatus('Token is required.', 'warning');
      return;
    }
    showStatus('Force pushing…', 'warning');
    await syncAll(config);
  });
</script>
</body>
</html>
