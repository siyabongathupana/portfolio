name: Backup (every 8h, keep 5 releases)

on:
  schedule:
    # Runs at 00:00, 08:00, 16:00 UTC (every 8 hours)
    - cron: '0 0,8,16 * * *'
  workflow_dispatch:   # manual trigger

permissions:
  contents: write      # needed to create releases

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Create backup archive
        run: |
          TIMESTAMP=$(date +'%Y-%m-%d_%H-%M-%S')
          echo "BACKUP_TIMESTAMP=$TIMESTAMP" >> $GITHUB_ENV
          
          # Create temporary folder
          mkdir -p backup_temp/data
          
          # Copy all user data
          cp -r data/* backup_temp/data/ 2>/dev/null || true
          cp config.js backup_temp/ 2>/dev/null || true
          
          # Count users
          USER_COUNT=$(ls -1 data/users/ 2>/dev/null | wc -l)
          
          # Create metadata
          cat > backup_temp/backup_info.json << EOF
          {
            "timestamp": "$TIMESTAMP",
            "date": "$(date -Iseconds)",
            "users_count": $USER_COUNT,
            "repository": "${{ github.repository }}",
            "commit_sha": "${{ github.sha }}",
            "workflow_run": "${{ github.run_id }}"
          }
          EOF
          
          # Compress everything
          tar -czf "backup_${TIMESTAMP}.tar.gz" -C backup_temp .
          rm -rf backup_temp

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: backup-${{ env.BACKUP_TIMESTAMP }}
          name: "📦 Backup ${{ env.BACKUP_TIMESTAMP }}"
          body: |
            ## Automated backup of portfolio data
            - **Date:** ${{ env.BACKUP_TIMESTAMP }}
            - **Users count:** (see backup_info.json)
            - **Repository:** ${{ github.repository }}
            - **Commit:** ${{ github.sha }}
          files: backup_*.tar.gz
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Keep only the 5 most recent releases (delete older ones)
        run: |
          # Fetch all release tags, sort by date (oldest first), delete all but last 5
          gh release list --limit 100 --json tagName,createdAt --jq 'sort_by(.createdAt) | .[:-5] | .[].tagName' | while read tag; do
            echo "Deleting old release: $tag"
            gh release delete "$tag" --yes --cleanup-tag
          done
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
