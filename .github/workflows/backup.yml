name: Daily Backup

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create backup directory with timestamp
        run: |
          TIMESTAMP=$(date +'%Y-%m-%d_%H-%M-%S')
          mkdir -p "backups/$TIMESTAMP/data"
          echo "BACKUP_TIMESTAMP=$TIMESTAMP" >> $GITHUB_ENV
          echo "BACKUP_DIR=backups/$TIMESTAMP" >> $GITHUB_ENV

      - name: Backup entire data folder (including all users)
        run: |
          if [ -d "data" ]; then
            cp -r data/* "$BACKUP_DIR/data/"
          else
            echo "No data folder found – creating empty structure"
            mkdir -p "$BACKUP_DIR/data"
          fi
          
          # Count total projects and certificates across ALL users
          PROJ_COUNT=0
          CERT_COUNT=0
          if [ -d "data/users" ]; then
            for userdir in data/users/*/; do
              if [ -f "${userdir}projects.json" ]; then
                PROJ_COUNT=$((PROJ_COUNT + $(jq 'length' "${userdir}projects.json" 2>/dev/null || echo 0)))
              fi
              if [ -f "${userdir}certificates.json" ]; then
                CERT_COUNT=$((CERT_COUNT + $(jq 'length' "${userdir}certificates.json" 2>/dev/null || echo 0)))
              fi
            done
          fi
          
          cat > "$BACKUP_DIR/backup_info.json" << EOF
          {
            "timestamp": "$BACKUP_TIMESTAMP",
            "date": "$(date -Iseconds)",
            "projects_count": $PROJ_COUNT,
            "certificates_count": $CERT_COUNT,
            "repository": "${GITHUB_REPOSITORY}",
            "commit_sha": "${GITHUB_SHA}"
          }
          EOF

      - name: Create ZIP archive (flattened)
        run: |
          cd backups/${{ env.BACKUP_TIMESTAMP }}
          zip -r "../${{ env.BACKUP_TIMESTAMP }}.zip" .
          cd ../..
          rm -rf backups/${{ env.BACKUP_TIMESTAMP }}

      - name: Delete backups older than 30 days
        run: find backups/ -name "*.zip" -type f -mtime +30 -delete

      - name: Commit and push backup
        run: |
          git config user.name "GitHub Backup Bot"
          git config user.email "backup@deltaV-portfolio.local"
          git add backups/
          git commit -m "Automated daily backup: ${{ env.BACKUP_TIMESTAMP }}" || echo "No changes to commit"
          git push origin HEAD:${GITHUB_REF_NAME:-main}
