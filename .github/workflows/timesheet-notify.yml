name: Timesheet Reminder

on:
  schedule:
    # Monday and Friday at 8:00 AM UTC (adjust to your timezone if needed)
    - cron:  '0 8 * * 1,5'
  workflow_dispatch:   # allow manual trigger

jobs:
  send-reminders:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2 

      - name: Setup Node.js
        uses: actions/setup-node@v4.2.2 
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install nodemailer

      - name: Send reminder emails
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          NOTIFY_FROM: ${{ secrets.NOTIFY_FROM_EMAIL }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
          BRANCH: main
          PORTFOLIO_URL: ${{ vars.PORTFOLIO_URL }}  # optional: set your live portfolio URL
        run: |
          const nodemailer = require('nodemailer');

          const owner = process.env.REPO_OWNER;
          const repo = process.env.REPO_NAME;
          const branch = process.env.BRANCH;
          const token = process.env.GITHUB_TOKEN;
          const portfolioBase = process.env.PORTFOLIO_URL || 'https://' + owner + '.github.io/' + repo;

          async function getFileContent(apiPath) {
            const url = `https://api.github.com/repos/${owner}/${repo}/contents/${apiPath}?ref=${branch}`;
            const res = await fetch(url, { headers: { Authorization: `Bearer ${token}` } });
            if (!res.ok) return null;
            const data = await res.json();
            if (data.content) {
              return Buffer.from(data.content, 'base64').toString('utf-8');
            }
            return null;
          }

          async function listUsers() {
            const url = `https://api.github.com/repos/${owner}/${repo}/contents/data/users?ref=${branch}`;
            const res = await fetch(url, { headers: { Authorization: `Bearer ${token}` } });
            if (!res.ok) return [];
            const items = await res.json();
            return items.filter(i => i.type === 'dir').map(i => i.name);
          }

          async function getUserPrefs(username) {
            const content = await getFileContent(`data/users/${encodeURIComponent(username)}/preferences.json`);
            if (content) {
              try { return JSON.parse(content); } catch(e) { return {}; }
            }
            return {};
          }

          async function getUserMeta(username) {
            const content = await getFileContent(`data/users/${encodeURIComponent(username)}/user_meta.json`);
            if (content) {
              try { return JSON.parse(content); } catch(e) { return {}; }
            }
            return {};
          }

          function getDayType() {
            const now = new Date();
            const day = now.getDay(); // 1 = Monday, 5 = Friday
            if (day === 1) return { type: 'Monday', message: 'start of the week' };
            if (day === 5) return { type: 'Friday', message: 'end of the week' };
            return { type: 'weekday', message: 'today' };
          }

          async function main() {
            const users = await listUsers();
            if (users.length === 0) {
              console.log('No users found');
              return;
            }

            const transporter = nodemailer.createTransport({
              host: process.env.SMTP_HOST,
              port: parseInt(process.env.SMTP_PORT),
              secure: process.env.SMTP_PORT === '465',
              auth: {
                user: process.env.SMTP_USER,
                pass: process.env.SMTP_PASS,
              }
            });

            const dayInfo = getDayType();
            const timesheetUrl = `${portfolioBase}/timesheet.html`;

            for (const username of users) {
              const prefs = await getUserPrefs(username);
              if (prefs.notifications === false) {
                console.log(`Reminders disabled for ${username}, skipping`);
                continue;
              }

              const meta = await getUserMeta(username);
              const fullName = meta.fullName || username.split('@')[0] || username;

              const html = `
                <div style="font-family: 'Inter', sans-serif; max-width: 600px; margin: 0 auto; padding: 20px; background: #f4f7fc; border-radius: 24px;">
                  <div style="background: #0b2b3b; padding: 20px; border-radius: 16px; text-align: center; color: white;">
                    <h2 style="margin: 0;">⏰ Timesheet Reminder</h2>
                  </div>
                  <div style="background: white; padding: 25px; border-radius: 16px; margin-top: 15px;">
                    <p>Hello <strong>${fullName}</strong>,</p>
                    <p>This is a friendly reminder to <strong>log your hours</strong> in the timesheet for ${dayInfo.message}.</p>
                    <p>Keeping your timesheet up‑to‑date helps with project tracking, billing, and personal productivity.</p>
                    <div style="text-align: center; margin: 30px 0;">
                      <a href="${timesheetUrl}" style="background: #2fc7ff; color: #0a2b33; padding: 12px 24px; text-decoration: none; border-radius: 40px; font-weight: 600;">📝 Log Your Hours Now</a>
                    </div>
                    <p style="font-size: 0.85rem; color: #5a7d9a;">If you've already logged your time today, thank you! You can ignore this message.</p>
                    <hr style="margin: 20px 0;">
                    <p style="font-size: 0.75rem; color: #999;">You received this because you enabled email notifications in your portfolio settings. To disable, go to the Timesheet page and toggle off notifications.</p>
                  </div>
                </div>
              `;

              const text = `Timesheet Reminder\n\nHello ${fullName},\n\nThis is a friendly reminder to log your hours in the timesheet for ${dayInfo.message}.\n\nLog here: ${timesheetUrl}\n\nIf you've already logged your time today, thank you! You can ignore this message.\n\nTo disable these reminders, go to the Timesheet page and toggle off notifications.`;

              try {
                await transporter.sendMail({
                  from: `"Your Portfolio" <${process.env.NOTIFY_FROM}>`,
                  to: username,
                  subject: `⏰ Timesheet Reminder – ${dayInfo.type}`,
                  html: html,
                  text: text,
                });
                console.log(`Reminder sent to ${username}`);
              } catch (err) {
                console.error(`Failed to send to ${username}:`, err.message);
              }
            }
          }

          main().catch(console.error);
