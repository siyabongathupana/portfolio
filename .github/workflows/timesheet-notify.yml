name: Timesheet Weekly Notification

on:
  schedule:
    # Monday and Friday at 9:00 UTC
    - cron: '0 9 * * 1,5'
  workflow_dispatch:   # allow manual trigger

jobs:
  send-summaries:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install nodemailer

      - name: Send email summaries
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          NOTIFY_FROM: ${{ secrets.NOTIFY_FROM_EMAIL }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
          BRANCH: main
        run: |
          const nodemailer = require('nodemailer');
          const fs = require('fs').promises;
          const path = require('path');

          const owner = process.env.REPO_OWNER;
          const repo = process.env.REPO_NAME;
          const branch = process.env.BRANCH;
          const token = process.env.GITHUB_TOKEN;

          async function getFileContent(apiPath) {
            const url = `https://api.github.com/repos/${owner}/${repo}/contents/${apiPath}?ref=${branch}`;
            const res = await fetch(url, { headers: { Authorization: `Bearer ${token}` } });
            if (!res.ok) return null;
            const data = await res.json();
            if (data.content) {
              return Buffer.from(data.content, 'base64').toString('utf-8');
            }
            return null;
          }

          async function listUsers() {
            const url = `https://api.github.com/repos/${owner}/${repo}/contents/data/users?ref=${branch}`;
            const res = await fetch(url, { headers: { Authorization: `Bearer ${token}` } });
            if (!res.ok) return [];
            const items = await res.json();
            return items.filter(i => i.type === 'dir').map(i => i.name);
          }

          async function getUserPrefs(username) {
            const content = await getFileContent(`data/users/${encodeURIComponent(username)}/preferences.json`);
            if (content) {
              try { return JSON.parse(content); } catch(e) { return {}; }
            }
            return {};
          }

          async function getTimesheet(username) {
            const content = await getFileContent(`data/users/${encodeURIComponent(username)}/timesheet.json`);
            if (content) {
              try { return JSON.parse(content); } catch(e) { return []; }
            }
            return [];
          }

          async function getUserMeta(username) {
            const content = await getFileContent(`data/users/${encodeURIComponent(username)}/user_meta.json`);
            if (content) {
              try { return JSON.parse(content); } catch(e) { return {}; }
            }
            return {};
          }

          function getWeekRange() {
            const now = new Date();
            const day = now.getDay();
            const monday = new Date(now);
            const diffToMonday = (day === 0 ? 6 : day - 1);
            monday.setDate(now.getDate() - diffToMonday);
            monday.setHours(0,0,0,0);
            const friday = new Date(monday);
            friday.setDate(monday.getDate() + 4);
            friday.setHours(23,59,59,999);
            return { start: monday, end: friday };
          }

          async function main() {
            const users = await listUsers();
            if (users.length === 0) {
              console.log('No users found');
              return;
            }

            const transporter = nodemailer.createTransport({
              host: process.env.SMTP_HOST,
              port: parseInt(process.env.SMTP_PORT),
              secure: process.env.SMTP_PORT === '465',
              auth: {
                user: process.env.SMTP_USER,
                pass: process.env.SMTP_PASS,
              }
            });

            const { start, end } = getWeekRange();
            const startStr = start.toISOString().split('T')[0];
            const endStr = end.toISOString().split('T')[0];
            console.log(`Reporting period: ${startStr} to ${endStr}`);

            for (const username of users) {
              const prefs = await getUserPrefs(username);
              if (prefs.notifications === false) {
                console.log(`Notifications disabled for ${username}, skipping`);
                continue;
              }

              const timesheet = await getTimesheet(username);
              const entries = timesheet.filter(e => {
                const d = new Date(e.date);
                return d >= start && d <= end;
              });
              if (entries.length === 0) {
                console.log(`No timesheet entries for ${username} this week`);
                continue;
              }

              const meta = await getUserMeta(username);
              const fullName = meta.fullName || username;

              let totalHours = 0, billableHours = 0;
              entries.forEach(e => {
                totalHours += e.hours;
                if (e.billable === 'yes') billableHours += e.hours;
              });
              const nonBillable = totalHours - billableHours;
              const dailyHours = {};
              entries.forEach(e => { dailyHours[e.date] = (dailyHours[e.date] || 0) + e.hours; });
              let overtime = 0;
              for (const h of Object.values(dailyHours)) if (h > 8) overtime += (h - 8);

              let rows = '';
              entries.forEach(e => {
                rows += `<tr>
                  <td>${e.date}</td>
                  <td>${e.start}</td>
                  <td>${e.end}</td>
                  <td>${e.hours.toFixed(2)}</td>
                  <td>${e.project}</td>
                  <td>${e.category}</td>
                  <td>${e.billable === 'yes' ? 'Billable' : 'Non-billable'}</td>
                  <td>${e.notes || '-'}</td>
                </tr>`;
              });

              const html = `
                <h2>Timesheet Summary for ${fullName}</h2>
                <p><strong>Period:</strong> ${startStr} to ${endStr}</p>
                <p><strong>Total Hours:</strong> ${totalHours.toFixed(2)} (Billable: ${billableHours.toFixed(2)} | Non-billable: ${nonBillable.toFixed(2)} | Overtime: ${overtime.toFixed(2)})</p>
                <table border="1" cellpadding="5" cellspacing="0" style="border-collapse: collapse; width: 100%;">
                  <thead><tr><th>Date</th><th>Start</th><th>End</th><th>Hours</th><th>Project</th><th>Category</th><th>Billable</th><th>Notes</th></tr></thead>
                  <tbody>${rows}</tbody>
                </table>
                <p><br>You can manage your notifications in the Timesheet page of the portfolio.</p>
              `;

              try {
                await transporter.sendMail({
                  from: `"Your Portfolio" <${process.env.NOTIFY_FROM}>`,
                  to: username,
                  subject: `Timesheet Summary (${startStr} – ${endStr})`,
                  html: html,
                });
                console.log(`Email sent to ${username}`);
              } catch (err) {
                console.error(`Failed to send to ${username}:`, err.message);
              }
            }
          }

          main().catch(console.error);
