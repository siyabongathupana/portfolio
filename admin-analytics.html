<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Analytics Dashboard | DeltaV Portfolio</title>
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="config.js"></script>
  <script src="crypto.js"></script>
  <script src="api.js"></script>
  <script src="shared.js"></script>
  <script src="analytics.js"></script>
  <style>
    .stat-card { background: white; border-radius: 24px; padding: 20px; margin-bottom: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
    .stat-number { font-size: 2.5rem; font-weight: 700; color: #2fc7ff; }
    .list-group-item { display: flex; justify-content: space-between; align-items: center; }
  </style>
</head>
<body style="background:#eef3fc;">

<div id="adminOnly" style="display:none;">
  <div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
      <h1><i class="fa fa-bar-chart"></i> Analytics Dashboard</h1>
      <div>
        <span class="user-badge mr-3" id="currentUserDisplay"></span>
        <button class="btn btn-outline-danger btn-sm" id="logoutBtn"><i class="fa fa-sign-out"></i> Logout</button>
      </div>
    </div>
    
    <div class="row">
      <div class="col-md-6">
        <div class="stat-card">
          <h4><i class="fa fa-folder-open"></i> Most Viewed Projects</h4>
          <div id="topProjectsList" class="list-group list-group-flush">Loading...</div>
        </div>
      </div>
      <div class="col-md-6">
        <div class="stat-card">
          <h4><i class="fa fa-certificate"></i> Most Viewed Certificates</h4>
          <div id="topCertsList" class="list-group list-group-flush">Loading...</div>
        </div>
      </div>
    </div>
    
    <div class="row">
      <div class="col-12">
        <div class="stat-card">
          <h4><i class="fa fa-download"></i> Download Statistics by User</h4>
          <div id="downloadStatsTable" class="table-responsive">Loading...</div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  const user = window.SessionManager?.getCurrentUser();
  const isAdmin = user && window.APP_CONFIG.adminUsers && window.APP_CONFIG.adminUsers.includes(user.username);
  
  if (!user || !isAdmin) {
    alert('Admin access required. Redirecting to login...');
    window.location.href = 'login.html';
  } else {
    document.getElementById('adminOnly').style.display = 'block';
    document.getElementById('currentUserDisplay').textContent = user.username;
    window.updateUserFooter();
    loadAnalytics();
  }
  
  async function loadAnalytics() {
    window.showLoading('Loading analytics...');
    
    // 1. Load all projects and certificates
    const projects = await window.portfolioData.loadProjects();
    const certs = await window.portfolioData.loadCertificates();
    
    const projectIds = Object.keys(projects);
    const certIds = certs.map(c => c.id);
    
    // 2. Get view counts from CountAPI
    const projectViews = await getAllViewCounts('project', projectIds);
    const certViews = await getAllViewCounts('certificate', certIds);
    
    // 3. Sort and display top projects
    const sortedProjects = Object.entries(projectViews)
      .sort((a,b) => b[1] - a[1])
      .slice(0, 10);
    
    const topProjectsHtml = sortedProjects.map(([id, count]) => {
      const title = projects[id]?.title || id;
      return `<div class="list-group-item"><span>${escapeHtml(title)}</span><span class="badge badge-primary badge-pill">${count} views</span></div>`;
    }).join('');
    document.getElementById('topProjectsList').innerHTML = topProjectsHtml || '<div class="list-group-item">No views yet</div>';
    
    // 4. Top certificates
    const certMap = {};
    certs.forEach(c => { certMap[c.id] = c.title; });
    const sortedCerts = Object.entries(certViews)
      .sort((a,b) => b[1] - a[1])
      .slice(0, 10);
    const topCertsHtml = sortedCerts.map(([id, count]) => {
      const title = certMap[id] || id;
      return `<div class="list-group-item"><span>${escapeHtml(title)}</span><span class="badge badge-primary badge-pill">${count} views</span></div>`;
    }).join('');
    document.getElementById('topCertsList').innerHTML = topCertsHtml || '<div class="list-group-item">No views yet</div>';
    
    // 5. Download statistics per user
    // Fetch all users, then for each user read their stats.json
    const usernames = await window.AccountManager.listUsers(user.pat).catch(() => []);
    const downloadStats = [];
    
    for (const username of usernames) {
      try {
        const stats = await window.AccountManager.getUserDownloadStats(username, user.pat);
        downloadStats.push({ username, ...stats });
      } catch(e) {}
    }
    
    const tableHtml = `
      <table class="table table-striped">
        <thead>
          <tr><th>User</th><th>Total Downloads</th><th>Most Downloaded Project</th></tr>
        </thead>
        <tbody>
          ${downloadStats.map(stat => `
            <tr>
              <td>${escapeHtml(stat.username)}</td>
              <td>${stat.totalDownloads || 0}</td>
              <td>${escapeHtml(stat.mostDownloaded || '—')}</td>
            </tr>
          `).join('')}
          ${downloadStats.length === 0 ? '<tr><td colspan="3">No download data yet</td></tr>' : ''}
        </tbody>
      </table>
    `;
    document.getElementById('downloadStatsTable').innerHTML = tableHtml;
    
    window.hideLoading();
  }
  
  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'})[m] || m);
  }
  
  document.getElementById('logoutBtn').addEventListener('click', () => {
    window.SessionManager.logout();
    window.location.href = 'login.html';
  });
</script>

<script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.0/dist/umd/popper.min.js"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
</body>
</html>
