<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | Your Portfolio</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <script src="https://cdn.jsdelivr.net/npm/speakeasyjs@1.0.5/speakeasy.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
  <script src="config.js"></script>
  <script src="crypto.js"></script>
  <script src="api.js"></script>
  <script src="shared.js"></script>
</head>
<body class="login-page">
  <div class="container">
    <div class="row justify-content-center mt-5 pt-5">
      <div class="col-md-5">
        <div class="card shadow-lg border-0 rounded-3">
          <div class="card-body p-5">
            <div class="text-center mb-4">
              <h2><span style="color:#2fc7ff;">Your</span> Portfolio</h2>
              <p class="text-muted">Sign in to manage your portfolio</p>
            </div>

            <div id="loginForm">
              <div class="form-group">
                <label>Email</label>
                <input type="email" id="loginUsername" class="form-control" placeholder="your@email.com">
              </div>
              <div class="form-group">
                <label>Passphrase</label>
                <input type="password" id="loginPassword" class="form-control" placeholder="Enter passphrase">
              </div>
              <button id="loginBtn" class="btn btn-delta btn-block mt-3">Login</button>
              <div class="text-center mt-3">
                <a href="#" id="showRegister">Create new account</a>
              </div>
              <div class="text-center mt-2">
                <a href="#" id="forgotPassphrase">Forgot passphrase?</a>
              </div>
            </div>

            <div id="registerForm" style="display:none;">
              <div class="form-group">
                <label>Your Email</label>
                <input type="email" id="regUsername" class="form-control" placeholder="you@example.com">
              </div>
              <div class="form-group">
                <label>Passphrase</label>
                <input type="password" id="regPassword" class="form-control" placeholder="Min 8 characters">
              </div>
              <div class="form-group">
                <label>Confirm Passphrase</label>
                <input type="password" id="regPasswordConfirm" class="form-control">
              </div>
              <div class="form-group">
                <label>GitHub Personal Access Token <small class="text-muted">(with repo scope)</small></label>
                <input type="password" id="regToken" class="form-control" placeholder="ghp_xxxxxxxxxxxxxxxxxxxx">
                <small class="text-muted"> <a href="https://github.com/settings/tokens" target="_blank">Create token</a> with "repo" scope.</small>
              </div>
              <button id="registerBtn" class="btn btn-delta btn-block mt-3">Register</button>
              <div class="text-center mt-3">
                <a href="#" id="showLogin">Already have an account? Login</a>
              </div>
            </div>

            <div id="errorMsg" class="alert alert-danger mt-3" style="display:none;"></div>
            <div id="successMsg" class="alert alert-success mt-3" style="display:none;"></div>

            <div class="text-center mt-4">
              <a href="index.html" class="btn btn-outline-delta btn-sm">← Back to Portfolio</a>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- TOTP Modal -->
  <div id="totpModal" style="display:none; position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); background:white; padding:25px; border-radius:16px; z-index:10000; box-shadow:0 10px 30px rgba(0,0,0,0.2); width:320px;">
    <h4>Two‑Factor Authentication</h4>
    <p>Enter the 6‑digit code from your authenticator app.</p>
    <input type="text" id="totpCode" class="form-control" placeholder="000000" maxlength="6" autocomplete="off">
    <div class="mt-3">
      <button id="totpSubmitBtn" class="btn btn-delta btn-block">Verify</button>
      <button id="totpCancelBtn" class="btn btn-outline-secondary btn-block mt-2">Cancel</button>
    </div>
  </div>
  <div id="totpOverlay" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:9999;"></div>

  <script src="login.js"></script>
</body>
</html>
